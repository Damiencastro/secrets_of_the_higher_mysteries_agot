## Air Magic

  ## Interaction
  zz_valyria_magic_air_magic_01.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_cwok$\n\nThrough the arts of [air_magic|E], it is possible to conjure forth a slicing blade of wind. This invisible blade gouges and slices, crippling and harming your chosen target."
  ##Spell Options
  ##event
  zz_valyria_magic_air_magic.001.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_01_name$"
  zz_valyria_magic_air_magic.001.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. With [recipient.GetFirstName]' before you, it would be possible to send a blade of the air, invisible to the eye and remove his head from its shoulders. But surely such a strike would be an affront to honour?"
  zz_valyria_magic_air_magic.001.opt.a:0 "Yes, slice them with the blade of air!"
  zz_valyria_magic_air_magic.001.opt.b:0 "Yes, show them the fury of the winds!"
  zz_valyria_magic_air_magic.001.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_01.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_01_name$"
  zz_valyria_magic_air_magic_01.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ striking [recipient.GetFirstName] with a crushing strike of wind."
  zz_valyria_magic_air_magic_01.toast.tt:0 "$zz_valyria_magic_air_magic_01.toast.desc$"
  zz_valyria_magic_air_magic_01.toast.tyranny:0 ""




  ## Interaction
  zz_valyria_magic_air_magic_02.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tr$\n$zz_cd$\n\nThrough the secret arts of [air_magic|E] it is possible to strike at the personal forces of your enemy."
  ##event
  zz_valyria_magic_air_magic.002.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_02_name$"
  zz_valyria_magic_air_magic.002.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. It is possible to create a targeted vaccum at the location of one of [recipient.GetFirstName] regiments.This vaccum would tear the air from the lungs of this regiment, consigning untold numbers of men to a most painful death. But surely such a strike would be an affront to honourable warfare?"
  zz_valyria_magic_air_magic.002.opt.a:0 "Yes, what good is honour to the dead?"
  zz_valyria_magic_air_magic.002.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_02.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_02_name$"
  zz_valyria_magic_air_magic_02.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ striking [target.GetName] of [recipient.GetFirstName] with a slicing blade of wind."
  zz_valyria_magic_air_magic_02.toast.tt:0 "$zz_valyria_magic_air_magic_02.toast.desc$"


  ## Interaction
  zz_valyria_magic_air_magic_03.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bca$\n\nThrough the secret arts of [air_magic|E] it is possible to conjure forth a wall of wind, to protext your forces from those who would seek to do them harm."
  ##event
  zz_valyria_magic_air_magic.003.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_03_name$"
  zz_valyria_magic_air_magic.003.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. It is possible to create a targeted a vortex of air to protect the troops of [recipient.GetFirstName].This vortex would make their forces considerably more resilient to attack. Do you wish to use the winds to shield these forces?"
  zz_valyria_magic_air_magic.003.opt.a:0 "Yes, for those troops are mine."
  zz_valyria_magic_air_magic.003.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_03.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_03_name$"
  zz_valyria_magic_air_magic_03.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ protecting the forces of [recipient.GetFirstName] with a barrier of protective wind."
  zz_valyria_magic_air_magic_03.toast.tt:0 "$zz_valyria_magic_air_magic_03.toast.desc$"

  ## Interaction
  zz_valyria_magic_air_magic_04.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tp$\n$zz_da$\n$zz_md$\n\nThrough the secret arts of [air_magic|E] it is possible to conjure forth the might of the storm. A ravaging hurricane to consume the world."
  ##event
  zz_valyria_magic_air_magic.004.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_04_name$"
  zz_valyria_magic_air_magic.004.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. It is possible to create a monstrous hurricane at the location of one of [recipient.GetFirstName] provinces. Such a storm would become a focal point of the heaven's untameable wrath, ruining men and structures alike. But surely such a strike would be an affront to honourable warfare?"
  zz_valyria_magic_air_magic.004.opt.a:0 "Yes, for I am the Lord of the Storm!"
  zz_valyria_magic_air_magic.004.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_04.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_04_name$"
  zz_valyria_magic_air_magic_04.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ conjuring a mighty storm at the location of [recipient.GetFirstName],  [target.GetName]."
  zz_valyria_magic_air_magic_04.toast.tt:0 "$zz_valyria_magic_air_magic_04.toast.desc$"


  ## Interaction
  zz_valyria_magic_air_magic_05.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bca$\n\nThrough the secret arts of [air_magic|E] it is possible to observe the portents of the future and seize the advantage in battle."
  ##event
  zz_valyria_magic_air_magic.005.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_05_name$"
  zz_valyria_magic_air_magic.005.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. It is possible to read the portents of the wind to benefit the forces of [recipient.GetFirstName].This wind would empower the advantages in battle of your forces. Do you wish to use the winds to empower these forces?"
  zz_valyria_magic_air_magic.005.opt.a:0 "Yes, for those troops are mine."
  zz_valyria_magic_air_magic.005.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_05.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_05_name$"
  zz_valyria_magic_air_magic_05.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ providing the forces of [recipient.GetFirstName] with an advantage in their battles."
  zz_valyria_magic_air_magic_05.toast.tt:0 "$zz_valyria_magic_air_magic_05.toast.desc$"


  ## Interaction
  zz_valyria_magic_air_magic_06.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_ta$\n$zz_cd$\n\nThrough the secret arts of [air_magic|E] it is possible to strike an enemy army with the full fury of the heavens."
  ##event
  zz_valyria_magic_air_magic.006.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_06_name$"
  zz_valyria_magic_air_magic.006.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. It is possible to conjure in the heavens a mighty blast of lightning, that will strike one of the armies of [recipient.GetFirstName] with an unrivalled fury. This would obliterate this army as a fighting unit. But surely such a strike would be an affront to honourable warfare?"
  zz_valyria_magic_air_magic.006.opt.a:0 "Yes, what good is honour to the dead?"
  zz_valyria_magic_air_magic.006.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_06.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_06_name$"
  zz_valyria_magic_air_magic_06.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ striking [target.GetName] of [recipient.GetFirstName] with a monstrous blast of lightning."
  zz_valyria_magic_air_magic_06.toast.tt:0 "$zz_valyria_magic_air_magic_06.toast.desc$"


  ## Interaction
  zz_valyria_magic_air_magic_07.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bca$\n\nThrough the secret arts of [air_magic|E] it is possible to enchant your forces to move with greater alacrity."
  ##event
  zz_valyria_magic_air_magic.007.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_07_name$"
  zz_valyria_magic_air_magic.007.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. It is possible to enchant the armies commanded by [recipient.GetFirstName] to move with much greater alacrity. Do you wish to use the winds to empower these forces?"
  zz_valyria_magic_air_magic.007.opt.a:0 "Yes, for those troops are mine."
  zz_valyria_magic_air_magic.007.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_07.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_07_name$"
  zz_valyria_magic_air_magic_07.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ providing the forces of [recipient.GetFirstName] with greater movement speed."
  zz_valyria_magic_air_magic_07.toast.tt:0 "$zz_valyria_magic_air_magic_07.toast.desc$"

  ## Interaction
  zz_valyria_magic_air_magic_08.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tr$\n$zz_sd$\n\nThrough the secret arts of [air_magic|E] it is possible to strike at an enemy army with the terrifying forces of the heavens."
  ##event
  zz_valyria_magic_air_magic.008.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_08_name$"
  zz_valyria_magic_air_magic.008.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. It is possible to call the very fury of the heaves to rest above oneof the armies of [recipient.GetFirstName]. You bring forth the storm, and let the lightning bolts strike down towards the target enemy, dealing massive damage."
  zz_valyria_magic_air_magic.008.opt.a:0 "Yes, what good is honour to the dead?"
  zz_valyria_magic_air_magic.008.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_08.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_08_name$"
  zz_valyria_magic_air_magic_08.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ striking every regiment in the army [target.GetName] of [recipient.GetFirstName] with a powerful blast of lightning."
  zz_valyria_magic_air_magic_08.toast.tt:0 "$zz_valyria_magic_air_magic_08.toast.desc$"

  ## Interaction
  zz_valyria_magic_air_magic_09.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tp$\n$zz_cd$\n\nThrough the secret arts of [air_magic|E] it is possible to strike at an enemy army with the terrifying forces of the heavens."
  ##event
  zz_valyria_magic_air_magic.009.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_09_name$"
  zz_valyria_magic_air_magic.009.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. It is possible to call from the skies a mighty blast from the sky, striking one of the provinces of [recipient.GetFirstName]. This horrid mystery brings nothing but destruction, obliterating entire armies, and leaving the province a shattered ruin."
  zz_valyria_magic_air_magic.009.opt.a:0 "Yes, what good is honour to the dead?"
  zz_valyria_magic_air_magic.009.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_09.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_09_name$"
