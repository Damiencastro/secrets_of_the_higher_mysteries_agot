  zz_valyria_magic_air_magic_09.toast.tt:0 "$zz_valyria_magic_air_magic_09.toast.desc$"


  ## Interaction
  zz_valyria_magic_air_magic_10.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_dca$\n\nThrough the secret arts of [air_magic|E] it is possible to use the winds to restrict the ability of a character's army to screen itself."
  ##event
  zz_valyria_magic_air_magic.010.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_10_name$"
  zz_valyria_magic_air_magic.010.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. You can restrict the screening ability of the troops that are commanded by [recipient.GetFirstName]. This will make them more likely to take damage from flanking attacks."
  zz_valyria_magic_air_magic.010.opt.a:0 "Yes, for those troops are mine."
