  zz_valyria_magic_air_magic_17.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bca$\n\nThrough the secret arts of [air_magic|E] it is possible to use the winds to improve the ability of a character's army to screen itself."
  ##event
  zz_valyria_magic_air_magic.017.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_17_name$"
  zz_valyria_magic_air_magic.017.desc:0 "[secondary_recipient.GetFirstName] stands ready to enact a mystery. \nAmong the streets of Asshai the aeromancers make their trade. but thr manipulation of the air is more than a simple conjurer's trick. To call upon the airs is to have the power to have a blade, or to rip the air from a man's lungs. You can improve the screening ability of the troops that are commanded by [recipient.GetFirstName]. This will make them less likely to take damage from flanking attacks."
  zz_valyria_magic_air_magic.017.opt.a:0 "Yes, for those troops are mine."
  zz_valyria_magic_air_magic.017.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_air_magic_17.toast.t:0 "[air_magic|E] - $zz_valyria_magic_air_magic_17_name$"
  zz_valyria_magic_air_magic_17.toast.desc:0 "$zz_toast_01$ [air_magic|E], $zz_toast_02$ strengthening the forces of [recipient.GetFirstName] ability to screen attacks."
  zz_valyria_magic_air_magic_17.toast.tt:0 "$zz_valyria_magic_air_magic_17.toast.desc$"