  zz_valyria_magic_contracts.00031.c:0 "Let us utilise our learning mastery"
  zz_valyria_magic_contracts.00031.d:0 "Let us utilise our learning skill"

  zz_valyria_magic_contracts.00032.t:0 "$zz_valyria_magic_contracts.00031.t$: Success!"
  zz_valyria_magic_contracts.00032.desc.resolution_type.stewardship:0 "Thankfully, I possess manifold abilities to manage administrative records, and this skill has proven transferable to navigating the archives of House [employer.GetHouse.GetBaseNameNoTooltip]. Thus I rapidly find a true jewel among these records, an account of the days just before the doom befell the Freehold."
  zz_valyria_magic_contracts.00032.desc.resolution_type.secondary_skill:0 "Thankfully, my capacities as a scholar allows me to rapidly find my way through the records stored for the centuries by House [employer.GetHouse.GetBaseNameNoTooltip]. Thus I rapidly find a true jewel among these records, a surviving account of refugees who fled the collapse of Valyria."
  zz_valyria_magic_contracts.00032.a:0 "Eureka!"
