l_english:
  
  zz_valyria_search_for_magic_decision:0 "Investigate the Magics of Valyria"
  zz_valyria_search_for_magic_decision_desc:0 "Having found mention in a hidden library of the secrets of the higher mysteries belonging to the lost Valyrian Freehold, the choice is yours whether or not you should seek to explore and discover these secrets of long lost Valyria."
  zz_valyria_search_for_magic_decision_tooltip:0 "Three locations have been suggested where you might find a scroll of Valyrian Magic."
  zz_gain_random_scroll:0 "Find a Scroll of Magic"
   
  zz_valyria_magic_visit_library_request:0 "Solve the situation potentially using your [learning|E] or [stewardship|E]"
  task_contract_mage_desc_title:0 "For the secrets of the Higher Mysteries!"

  zz_valyria_magic_visit_library_contract:0 "Examine Library"
  zz_valyria_magic_visit_library_desc:0 "Old families are known to keep private collections of texts dating for many hundreds of years. An expedition to visit a library might reveal hitherto unknown secrets of the lost Freehold."
  zz_valyria_magic_visit_library_desc_title:0 "$task_contract_mage_desc_title$"

  zz_valyria_magic_contracts.00011.t:0 "The archives of House [employer.GetHouse.GetBaseNameNoTooltip]""
  zz_valyria_magic_contracts.00011.desc:0 "Our arrival in [employer.GetPrimaryTitle.GetBaseNameNoTier] is met with little fanfare — the locals are in some measure of frustration of our desires to accesss the records stored in this location.\n\nWithout our rapid completion of our examinations the local population may become antagonised by our presence.$zz_valyria_magic_contracts.00011.desc.outro$"
  zz_valyria_magic_contracts.00011.desc.outro:0 "\n\n[employer.GetTitledFirstName|U] is at pains to let us know that their tolerance of our intrusion into their archives has its limits."
  zz_valyria_magic_contracts.00011.a:0 "Let us utilise our administrative mastery"
  zz_valyria_magic_contracts.00011.b:0 "Let us utilise our administrative skill"
  zz_valyria_magic_contracts.00011.c:0 "Let us utilise our learning mastery"
  zz_valyria_magic_contracts.00011.d:0 "Let us utilise our learning skill"

  zz_valyria_magic_contracts.00012.t:0 "$zz_valyria_magic_contracts.00011.t$: Success!"
  zz_valyria_magic_contracts.00012.desc.resolution_type.stewardship:0 "Thankfully, I possess manifold abilities to manage administrative records, and this skill has proven transferable to navigating the archives of House [employer.GetHouse.GetBaseNameNoTooltip]. Thus I rapidly find a true jewel among these records, a scroll from lost Valyria."
  zz_valyria_magic_contracts.00012.desc.resolution_type.secondary_skill:0 "Thankfully, my capacities as a scholar allows me to rapidly find my way through the records stored for the centuries by House [employer.GetHouse.GetBaseNameNoTooltip]. Thus I rapidly find a true jewel among these records, a scroll from lost Valyria."
  zz_valyria_magic_contracts.00012.a:0 "Eureka!"
  zz_valyria_magic_contracts.00013.t:0 "$zz_valyria_magic_contracts.00011.t$: Failure!"
  zz_valyria_magic_contracts.00013.desc.resolution_type.stewardship:0 "My skills navigating the intricacies of governance sadly have not led me to make any sense of the archives of house [employer.GetHouse.GetBaseNameNoTooltip]. Thus, alas, with regrets I have not found what I was looking for."
  zz_valyria_magic_contracts.00013.desc.resolution_type.secondary_skill:0 "My vaunted scholarly abilities sadly have not led me to make any sense of the archives of house [employer.GetHouse.GetBaseNameNoTooltip]. Thus, alas, with regrets I have not found what I was looking for."
  zz_valyria_magic_contracts.00013.a "Damnations!"

