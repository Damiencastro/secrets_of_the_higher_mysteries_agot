  zz_valyria_magic_visit_library_dragonstone_contract:0 "Secrets of the Higher Mysteries"
  zz_valyria_magic_visit_library_dragonstone_desc:0 "You have stumbled upon traces of a legacy of the lost Freehold. By following the trail of fragments, you may be able to recover the magics that once made Valyria the greatest empire in the world."
  zz_valyria_magic_visit_library_dragonstone_desc_title:0 "$task_contract_mage_desc_title$"

  zz_valyria_magic_secrets_of_the_dooom_contract:0 "Visions of the Doom"
  zz_valyria_magic_secrets_of_the_dooom_desc:0 "The fall of Valyria left scars upon the world itself. Seek out fragments of knowledge to trigger a lingering connection you have to the esoteric forces that brought about Valyria's end"
  zz_valyria_magic_secrets_of_the_dooom_request:0 "Solve the situation potentially using your [learning|E] or [stewardship|E]"
  zz_valyria_magic_secrets_of_the_dooom_desc_title:0 "The mysteries of the Doom shall be revealed!"


  zz_valyria_magic_contracts.00031.t:0 "Visions of the Doom"
  zz_valyria_magic_contracts.00031.desc:0 "My visions of the fall of Valyria has led me to [employer.GetPrimaryTitle.GetBaseNameNoTier]. While our arrival is met with little fanfare — the locals are in some measure of frustration of our desires to accesss the records stored in this location.\n\nWithout our rapid completion of our examinations the local population may become antagonised by our presence.$zz_valyria_magic_contracts.00031.desc.outro$"
  zz_valyria_magic_contracts.00031.desc.outro:0 "\n\n[employer.GetTitledFirstName|U] is at pains to let us know that their tolerance of our intrusion into their archives has its limits."
