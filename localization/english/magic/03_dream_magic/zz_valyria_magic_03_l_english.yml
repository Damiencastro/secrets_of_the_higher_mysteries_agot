  zz_valyria_magic_dream_magic.049.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nVisions of what are to be are such that that they can take a binding roll upon fate. Such prophecies could ensure a measure of certainty over the fate of children born to [recipient.GetName]. Are you sure you wish to make such a prophecy?"
  zz_valyria_magic_dream_magic.049.opt.a:0 "Yes, Let destiny be written!"
  zz_valyria_magic_dream_magic.049.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_49.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_49_name$"
  zz_valyria_magic_dream_magic_49.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ proclaiming a prophecy that the children born to [recipient.GetName]'s shall not be malformed."
  zz_valyria_magic_dream_magic_49.toast.tt:0 "$zz_valyria_magic_dream_magic_49.toast.desc$"

  zz_valyria_magic_dream_magic_49.buff.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_49_name$"
