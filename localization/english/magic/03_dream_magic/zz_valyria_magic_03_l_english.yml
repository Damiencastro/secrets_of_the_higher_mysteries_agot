

l_english:

  
  ## Dream Magic Magic
  zz_valyria_magic_dream_magic_01.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_gh$\n$zz_cf$\n\nThrough the use of [dream_magic|E], it is possible to bind another into service, compelling their obedience."
  ## event
  zz_valyria_magic_dream_magic.001.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_01_name$"
  zz_valyria_magic_dream_magic.001.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. A most terrifying power is to bring this primal shared reality upon a subject's mind and bring them into compliance. Even the most deeply held convictions can be commanded in this manner. Do you wish to wield such a power againt [recipient.GetName] to remake their very self?"
  zz_valyria_magic_dream_magic.001.opt.a:0 "Yes, Take their Mind!"
  zz_valyria_magic_dream_magic.001.opt.b:0 "Yes, Mind, Body, and Soul!"
  zz_valyria_magic_dream_magic.001.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_01.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_01_name$"
  zz_valyria_magic_dream_magic_01.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ , they have brought [recipient.GetFirstName] under the power of [actor.GetFirstName]."
  zz_valyria_magic_dream_magic_01.toast.tt:0 "$zz_valyria_magic_dream_magic_01.toast.desc$"

  ## Interaction
  zz_valyria_magic_dream_magic_02.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_glt$\n\nThrough the use of [dream_magic|E], it is possible to anticipate the future yet to come. To gain experince in the fields of study you have yet to undertake."

  #event
  zz_valyria_magic_dream_magic.002.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_02_name$"
  zz_valyria_magic_dream_magic.002.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can let [recipient.GetName] gain experience in a chosen disicipline of life. But such powers intrude into the soul of the subject. Are you sure this is something you to risk?"
  zz_valyria_magic_dream_magic.002.opt.a:0 "Yes, Let them dream of a lifetime!"
  zz_valyria_magic_dream_magic.002.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_02.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_02_name$"
  zz_valyria_magic_dream_magic_02.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ making it possible to acquire the knowledge of arts you are yet to possess."
  zz_valyria_magic_dream_magic_02.toast.tt:0 "$zz_valyria_magic_dream_magic_02.toast.desc$"

  ## Interaction
  zz_valyria_magic_dream_magic_03.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_glx$\n\nThrough the use of [dream_magic|E], it is possible to take up the experiences of the great masters of the arts of life. Choose a lifestyle, and let the chosen character gain experience in this lifestyle."
  #event
  zz_valyria_magic_dream_magic.003.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_03_name$"
  zz_valyria_magic_dream_magic.003.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. It is possible to induce in [recipient.GetName] dreams of possible fiutures and to gain experience in lifestyles they have not yet achieved. Is this an intrusion into the realm of the God of dreams you wish to make?"
  zz_valyria_magic_dream_magic.003.opt.a:0 "Yes,  dream of Learning!"
  zz_valyria_magic_dream_magic.003.opt.b:0 "Yes,  dream of Diplomacy!"
  zz_valyria_magic_dream_magic.003.opt.c:0 "Yes,  dream of Stewardship!"
  zz_valyria_magic_dream_magic.003.opt.d:0 "Yes,  dream of Intrigue!"
  zz_valyria_magic_dream_magic.003.opt.e:0 "Yes,  dream of Martial!"
  zz_valyria_magic_dream_magic.003.opt.f:0 "Yes,  dream of Wandering!"
  zz_valyria_magic_dream_magic.003.opt.g:0 "Yes,  dream of Prowess!"
  zz_valyria_magic_dream_magic.003.opt.h:0 "Yes,  dream of Leadership!"
  zz_valyria_magic_dream_magic.003.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_03.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_03_name$"
  zz_valyria_magic_dream_magic_03.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ making it possible to acquire the knowledge experience in the myriad walks of life."
  zz_valyria_magic_dream_magic_03.toast.tt:0 "$zz_valyria_magic_dream_magic_03.toast.desc$"

  ## Interaction
  zz_valyria_magic_dream_magic_04.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n\nThrough the use of [dream_magic|E], it is possible to learn many things. Secrets, plots, and indeed knowledge of things remote."

  #event
  zz_valyria_magic_dream_magic.004.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_04_name$"
  zz_valyria_magic_dream_magic.004.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can let [recipient.GetName] gain knowledge of the secrets of those who surround them. While they will not be able to choose which secrets are learned, such dreams have a great utility in knowing the plots that are forming in the minds of ones contemparies. But do you wish to violate privacy in such a way?"
  zz_valyria_magic_dream_magic.004.opt.a:0 "Yes, Let them dream of the unknown!"
  zz_valyria_magic_dream_magic.004.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_04.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_04_name$"
  zz_valyria_magic_dream_magic_04.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ bringing forth many knowledges of things yet unknown."
  zz_valyria_magic_dream_magic_04.toast.tt:0 "$zz_valyria_magic_dream_magic_04.toast.desc$"

  ## Interaction
  zz_valyria_magic_dream_magic_05.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_mpt$\n\nThrough the use of [dream_magic|E], it is posisble to implant careful whispers and to change a person at the most fundamental level. To change who and what they are."
  ##Spell Options
  ## event
  zz_valyria_magic_dream_magic.005.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_05_name$"
  zz_valyria_magic_dream_magic.005.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. A most terrifying power is to bring this primal shared reality upon a subject's mind and bring them into compliance. Even the most deeply held convictions can be commanded in this manner. Do you wish to wield such a power againt [recipient.GetName] to remake their very self?"
  zz_valyria_magic_dream_magic.005.opt.a:0 "Yes, let's remake their personality!"
  zz_valyria_magic_dream_magic.005.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_05.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_05_name$"
  zz_valyria_magic_dream_magic_05.toast.desc:0  "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ transforming the personality of  [recipient.GetFirstName]"
  zz_valyria_magic_dream_magic_05.toast.tt:0 "$zz_valyria_magic_dream_magic_05.toast.desc$"


  zz_valyria_magic_dream_magic_06.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_get$\n\nThrough the use of [dream_magic|E], it is possible to anticipate the future that never was. You can change the entire course of a life, remaking an edcuation.."
  ## Spell Options

  #event
  zz_valyria_magic_dream_magic.006.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_06_name$"
  zz_valyria_magic_dream_magic.006.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can let [recipient.GetName] gain experience in a chosen disicipline of life. But such powers intrude into the soul of the subject. Are you sure this is something you to risk?"
  zz_valyria_magic_dream_magic.006.opt.a:0 "Yes, Let them dream of a lifetime!"
  zz_valyria_magic_dream_magic.006.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_06.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_06_name$"
  zz_valyria_magic_dream_magic_06.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ making it possible for [recipient.GetName] to acquire the knowledge of arts they have not choosen not to learn."
  zz_valyria_magic_dream_magic_06.toast.tt:0 "$zz_valyria_magic_dream_magic_06.toast.desc$"



  zz_valyria_magic_dream_magic_07.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bcm$\n\nThrough the use of [dream_magic|E], it is possible to anticipate future cutural innovations."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.007.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_07_name$"
  zz_valyria_magic_dream_magic.007.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can let [recipient.GetName] see visions of ways their culture could grow and develop. Such visions would let the culture expand rapidly if they happen to be the cultural head. But is it wise to tresspass into the realities of the future?"
  zz_valyria_magic_dream_magic.007.opt.a:0 "Yes, Let them dream of the future!"
  zz_valyria_magic_dream_magic.007.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_07.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_07_name$"
  zz_valyria_magic_dream_magic_07.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ revealing insights into possible cultural innovations."
  zz_valyria_magic_dream_magic_07.toast.tt:0 "$zz_valyria_magic_dream_magic_07.toast.desc$"




  zz_valyria_magic_dream_magic_08.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_cwok$\n\nThrough the use of [dream_magic|E], it is possible to strike down your foes directly with debilitating visions of what yet may be."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.008.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_08_name$"
  zz_valyria_magic_dream_magic.008.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can let [recipient.GetName] see monstrous dreams, entrapping them away from the world, or indeed even striking them to their very death. But is it wise to tresspass into the realities of the dream?"
  zz_valyria_magic_dream_magic.008.opt.a:0 "Yes, strike them with a debilitating dream!"
  zz_valyria_magic_dream_magic.008.opt.b:0 "Yes, send them to the dream!"
  zz_valyria_magic_dream_magic.008.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_08.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_08_name$"
  zz_valyria_magic_dream_magic_08.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ revealing insights into possible cultural innovations."
  zz_valyria_magic_dream_magic_08.toast.tt:0 "$zz_valyria_magic_dream_magic_08.toast.desc$"




  zz_valyria_magic_dream_magic_09.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n\nThrough the use of [dream_magic|E], it is possible to seek minor insights into the future."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.009.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_09_name$"
  zz_valyria_magic_dream_magic.009.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can let [recipient.GetName] have minor visions of the future. Such visions might be about advances in their skillls, or be visions that inspire their to take up the tasks worthy of achievement. But is it wise to tresspass into the realities of the future?"
  zz_valyria_magic_dream_magic.009.opt.a:0 "Yes, Let them dream of the future!"
  zz_valyria_magic_dream_magic.009.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_09.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_09_name$"
  zz_valyria_magic_dream_magic_09.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ revealing insights into possible future outcomes."
  zz_valyria_magic_dream_magic_09.toast.tt:0 "$zz_valyria_magic_dream_magic_09.toast.desc$"


  zz_valyria_magic_dream_magic_10.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bcm$\n\nThrough the use of [dream_magic|E], it is possible to draw upon the power of future dreams, improving [drops_of_power|E] gain in the present.."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.010.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_10_name$"
  zz_valyria_magic_dream_magic.010.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can manipulate the conceptual substance of [recipient.GetName]. This will improve the rate at which they are able to generate upon [drops_of_power|E]. But is it worth it to seek to draw upon such powers greater than the natural ken?"
  zz_valyria_magic_dream_magic.010.opt.a:0 "Yes, Let them dream of power!"
  zz_valyria_magic_dream_magic.010.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_10.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_10_name$"
  zz_valyria_magic_dream_magic_10.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ drawing forth future potentials to increase [drops_of_power|E] gain in the present."
  zz_valyria_magic_dream_magic_10.toast.tt:0 "$zz_valyria_magic_dream_magic_10.toast.desc$"

  zz_valyria_magic_dream_magic_11.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_rp$\n\nThrough the use of [dream_magic|E], it is possible to enter the mind of a character, to take from within their mind knowledge of the schemes they are plotting, and to expose these schemes and their accomplices."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.011.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_11_name$"
  zz_valyria_magic_dream_magic.011.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can scour the mind of [recipient.GetName] for their nefarious schemes. This will rip from them the knowledge of the plots they are undertaking, exposing to the world their true diabolical character. But is it worth while to reveal their depravity?"
  zz_valyria_magic_dream_magic.011.opt.a:0 "Yes, Let us take the knowledge of their plots!"
  zz_valyria_magic_dream_magic.011.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_11.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_11_name$"
  zz_valyria_magic_dream_magic_11.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ revealing one of [recipient.GetName]'s' plots for the world to know."
  zz_valyria_magic_dream_magic_11.toast.tt:0 "$zz_valyria_magic_dream_magic_11.toast.desc$"

  zz_valyria_magic_dream_magic_12.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_rp$\n\nThrough the use of [dream_magic|E], it is possible to enter the mind of a character, and from this rooted tree grasp a scheme that is targeting them to reveal it to the world."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.012.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_12_name$"
  zz_valyria_magic_dream_magic.012.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can scour the mind of [recipient.GetName] for their inutitions of the plots that target them. Such magic will reveal all that is planned against them, and let you expose this twisted reality to the entire world. Are you sure you wish to do this?"
  zz_valyria_magic_dream_magic.012.opt.a:0 "Yes, Let us take the knowledge of the plots that target them!"
  zz_valyria_magic_dream_magic.012.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_12.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_12_name$"
  zz_valyria_magic_dream_magic_12.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ revealing one plot that is targeting [recipient.GetName] for all the world to know."
  zz_valyria_magic_dream_magic_12.toast.tt:0 "$zz_valyria_magic_dream_magic_12.toast.desc$"


  zz_valyria_magic_dream_magic_13.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_rs$\n\nThrough the use of [dream_magic|E], it is possible to enter the mind of a character, and from this rooted tree grasp one of their secrets."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.013.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_13_name$"
  zz_valyria_magic_dream_magic.013.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can scour the mind of [recipient.GetName] and take from them the knowledge of one of their secrets. Are you sure you wish to do this?"
  zz_valyria_magic_dream_magic.013.opt.a:0 "Yes, Let us take their secrets!"
  zz_valyria_magic_dream_magic.013.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_13.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_13_name$"
  zz_valyria_magic_dream_magic_13.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ taking the knowledge of one of [recipient.GetName]'s' secrets."
  zz_valyria_magic_dream_magic_13.toast.tt:0 "$zz_valyria_magic_dream_magic_13.toast.desc$"


  zz_valyria_magic_dream_magic_14.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_rs$\n\nThrough the use of [dream_magic|E], it is possible to enter the mind of a character, and from this rooted tree grasp a secret that is targeting them."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.014.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_14_name$"
  zz_valyria_magic_dream_magic.014.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can scour the mind of [recipient.GetName] and look for things that infest the shadow of their minds. You can pull from this shadow the truth of a secret that targets your chosen victim. Are you sure you wish to do this?"
  zz_valyria_magic_dream_magic.014.opt.a:0 "Yes, Let us take the secrets that beset them!"
  zz_valyria_magic_dream_magic.014.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_14.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_14_name$"
  zz_valyria_magic_dream_magic_14.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ revealing one secret that is targeting [recipient.GetName] for yourself to know."
  zz_valyria_magic_dream_magic_14.toast.tt:0 "$zz_valyria_magic_dream_magic_14.toast.desc$"

  zz_valyria_magic_dream_magic_15.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_rs$\n\nThrough the use of [dream_magic|E], it is possible to enter the mind of a character, and take for yourself a secret they happen to know."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.015.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_15_name$"
  zz_valyria_magic_dream_magic.015.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can scour the mind of [recipient.GetName] and look for the secrets they have knowledge of. It is possible to take this knowledge as your own, learning more of the secrets that sit in the world. Are you sure you wish to do this?"
  zz_valyria_magic_dream_magic.015.opt.a:0 "Yes, Let us take their knowledge of secrets!"
  zz_valyria_magic_dream_magic.015.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_15.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_15_name$"
  zz_valyria_magic_dream_magic_15.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ revealing one secret known by [recipient.GetName] for yourself."
  zz_valyria_magic_dream_magic_15.toast.tt:0 "$zz_valyria_magic_dream_magic_15.toast.desc$"



  zz_valyria_magic_dream_magic_16.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_rs$\n\nThrough the use of [dream_magic|E], it is possible to enter the mind of a character, and use this as the roots of knowledge, to find the minds of those who know this secret and bind them from spreading them.."
  ## Spell Options
  #event
  zz_valyria_magic_dream_magic.016.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_16_name$"
  zz_valyria_magic_dream_magic.016.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe lingering power of dreams is more than a subtle undercurrent of the world, but rather, an subtle and enduring legacy of creation's common origins. Through their dreams you can scour the mind of [recipient.GetName] and look for their secrets.It is then possible to make those who know these secrets forever bound from spreading their knowledge. Are you sure you wish to do this?"
  zz_valyria_magic_dream_magic.016.opt.a:0 "Yes, Let us bind this secret!"
  zz_valyria_magic_dream_magic.016.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_dream_magic_16.toast.t:0 "[dream_magic|E] - $zz_valyria_magic_dream_magic_16_name$"
  zz_valyria_magic_dream_magic_16.toast.desc:0 "$zz_toast_01$ [dream_magic|E], $zz_toast_02$ binding one of the knowers of a secrets of [recipient.GetName] from revealling their knowledge."
