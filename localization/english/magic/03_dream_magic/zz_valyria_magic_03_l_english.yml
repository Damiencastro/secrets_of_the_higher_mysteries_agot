  zz_valyria_magic_dream_magic_17.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_rs$\n\nThrough the use of [dream_magic|E], it is possible to enter the mind of a character, and use this as the roots of knowledge, to discover a secret targeting them, and then to find the minds of those who know this secret and bind them from spreading them.."
