  ## Interaction
  ##\n\nThe use of the arcane forces of [shadow_magic|E] to increase the fortication level of a province belonging to the selected subject.
  zz_valyria_magic_shadow_magic_16.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tp$\n$zz_bsp$\n$zz_ccf$\n\nThe use of the arcane forces of [shadow_magic|E] to increase the fortication level of a province belonging to the selected subject.\n\nThe use of the arcane forces of [shadow_magic|E] to fortify a province, making it more resilient to actions from enemies."
