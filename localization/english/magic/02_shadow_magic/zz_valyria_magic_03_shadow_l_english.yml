  ## Interaction
  ##\n\nThe use of the arcane forces of [shadow_magic|E] to decrease the fortication level of a province belonging to the selected subject.
  zz_valyria_magic_shadow_magic_17.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tp$\n$zz_dsp$\n$zz_ccf$\n\nThe use of the arcane forces of [shadow_magic|E] to decrease the fortication level of a province belonging to the selected subject.\n\nThe use of the arcane forces of [shadow_magic|E] to infest their defenses, reducing their capabilities to defend a chosen province from sieges."
