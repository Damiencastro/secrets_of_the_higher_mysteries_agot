  ## Interaction
  zz_valyria_magic_shadow_magic_12.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tr$\n$zz_dr$\n$zz_ld$\n\nThe use of the arcane forces of [shadow_magic|E] to enfuse a blade with the magics of shadow, ensuring greater success in the use of weapons. ."
  ## event
  zz_valyria_magic_shadow_magic.012.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_12_name$"
  zz_valyria_magic_shadow_magic.012.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. By pulling forth the shadows, it is possible to distill the shadowy essence and let it rest within the weapon of [recipient.GetName]. This will ensure in their next single battle that their blade will not fail them."
  zz_valyria_magic_shadow_magic.012.opt.a:0 "Yes, empower this weapon!"
  zz_valyria_magic_shadow_magic.012.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_12.toast.t:0  "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_12_name$"
