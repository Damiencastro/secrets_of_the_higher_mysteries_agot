

l_english:

  ## Shadow Magic
  ## Interaction
  zz_valyria_magic_shadow_magic_01.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bcm$\n\nThe use of [shadow_magic|E] is capable of providing your forces with a potent mobility."
  ## event 
  zz_valyria_magic_shadow_magic.001.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_01_name$"
  zz_valyria_magic_shadow_magic.001.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. It is possible to use these shadows to enfuse your forces, to make the logistical challenges of a war simple to manage. If you enfuse [recipient.GetName] with these otherworldly forces they shall be able to effortlessly outmanouver their foes. But can we trust the shadows?"
  zz_valyria_magic_shadow_magic.001.opt.a:0 "Yes, from darkness!"
  zz_valyria_magic_shadow_magic.001.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_01.toast.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_01_name$"
  zz_valyria_magic_shadow_magic_01.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ granting profound mobility to [recipient.GetFirstName]."
  zz_valyria_magic_shadow_magic_01.toast.tt:0 "$zz_valyria_magic_shadow_magic_01.toast.desc$"


  ## Interaction
  zz_valyria_magic_shadow_magic_02.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bcm$\n\nThe use of [shadow_magic|E] is capable of providing your plots and schemes the hidden edge of  a dagger cloaked in shadow"
  ## event
  zz_valyria_magic_shadow_magic.002.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_02_name$"
  zz_valyria_magic_shadow_magic.002.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. It is possible to make plots be soaked in the shadows, improving the successs of plots. If you choose the schemes of [recipient.GetName] will be empowered by the shadows. But can you trust the shadows?"
  zz_valyria_magic_shadow_magic.002.opt.a:0 "Yes, from darkness!"
  zz_valyria_magic_shadow_magic.002.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_02.toast.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_02_name$"
  zz_valyria_magic_shadow_magic_02.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ manipulating the scheme success of [recipient.GetFirstName]."
  zz_valyria_magic_shadow_magic_02.toast.tt:0 "$zz_valyria_magic_shadow_magic_02.toast.desc$"

  ## Interaction
  zz_valyria_magic_shadow_magic_03.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bcm$\n\nThe use of [shadow_magic|E] is capable of providing you with a powerful shield against plots and schemes. This shadowy shield clings to you and keeps you ever secure."
  ## event
  zz_valyria_magic_shadow_magic.003.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_03_name$"
  zz_valyria_magic_shadow_magic.003.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. It is possible to use these shadows to make [recipient.GetName] much more resilient to plots. Such a spell requires you to trust that the shadows will not betray your designs. But can we trust the shadows?"
  zz_valyria_magic_shadow_magic.003.opt.a:0 "Yes, from darkness!"
  zz_valyria_magic_shadow_magic.003.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_03.toast.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_03_name$"
  zz_valyria_magic_shadow_magic_03.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ manipulating the scheme vulnerabilities of [recipient.GetFirstName]."
  zz_valyria_magic_shadow_magic_03.toast.tt:0 "$zz_valyria_magic_shadow_magic_03.toast.desc$"

  ## Interaction
  zz_valyria_magic_shadow_magic_04.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bcm$\n\nThe use of [shadow_magic|E] is capable of providing your realm with a cloak of shadow, extending the time taken for any enemy action to bring about its own success."
  ##Spell Options
  ## event
  zz_valyria_magic_shadow_magic.004.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_04_name$"
  zz_valyria_magic_shadow_magic.004.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. By twisting the shadows against themselves, one could make the plots against [recipient.GetName] take longer to reach their fruition. But is it truly right to use the forces of shadow for such a task?"
  zz_valyria_magic_shadow_magic.004.opt.a:0 "Yes, the darkness is my ally!"
  zz_valyria_magic_shadow_magic.004.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_04.toast.t:0  "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_04_name$"
  zz_valyria_magic_shadow_magic_04.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ changing the vulnerabilities of disease in the country of [target.GetFirstName]"
  zz_valyria_magic_shadow_magic_04.toast.tt:0 "$zz_valyria_magic_shadow_magic_04.toast.desc$"

  ## Interaction
  zz_valyria_magic_shadow_magic_05.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_dcm$\n\nThe use of [shadow_magic|E] is capable of grasping a chosen character's army in grasping hands of shadow, restricting movement, and slowing its progression"
  ##Spell Options
  ## event
  zz_valyria_magic_shadow_magic.005.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_05_name$"
  zz_valyria_magic_shadow_magic.005.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. By coiling chains of raw shadow, the ability of [recipient.GetName]'s forces to mobilise can be impaired. Such an action is to invite the shadows to restrain men, and is such an act truly one of virtue?"
  zz_valyria_magic_shadow_magic.005.opt.a:0 "Yes, The shadows tie!"
  zz_valyria_magic_shadow_magic.005.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_05.toast.t:0  "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_05_name$"
  zz_valyria_magic_shadow_magic_05.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ impacting the movement speed of [target.GetFirstName]'s army."
  zz_valyria_magic_shadow_magic_05.toast.tt:0 "$zz_valyria_magic_shadow_magic_05.toast.desc$"

  zz_valyria_magic_shadow_magic_06.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_dcm$\n\nThe use of [shadow_magic|E] is capable of grasping a chosen character's nefarious plots and bluting their effectiveness. With this spell plots and schemes shall be negatively affected."
  ##Spell Options
  ## event
  zz_valyria_magic_shadow_magic.006.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_06_name$"
  zz_valyria_magic_shadow_magic.006.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. You could reduce the hidden blades of [recipient.GetName] to mere shadows of their true nature. Taking the knife hidden in the darkness, and turning it's blade to a thing of mere shadow and vapour. But is it wise to trust one's security to the shadows?"
  zz_valyria_magic_shadow_magic.006.opt.a:0 "Yes, I trust the shadows!"
  zz_valyria_magic_shadow_magic.006.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_06.toast.t:0  "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_06_name$"
  zz_valyria_magic_shadow_magic_06.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ constraining the plots of [target.GetFirstName]."
  zz_valyria_magic_shadow_magic_06.toast.tt:0 "$zz_valyria_magic_shadow_magic_06.toast.desc$"

  zz_valyria_magic_shadow_magic_07.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_dcm$\n\nThe use of [shadow_magic|E] is capable of seeding shadows within the mind and realm of a character. With this [zz_mystery|E] the target's realm will have weakened resistence to plots and schemes."
  ##Spell Options
  ## event
  zz_valyria_magic_shadow_magic.007.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_07_name$"
  zz_valyria_magic_shadow_magic.007.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. By binding the shadows it is possible to saturate [recipient.GetName] in the darkness. Such a shrouding will make attempts to bring harm to them more successful and reduce their ability to endure secret strikes."
  zz_valyria_magic_shadow_magic.007.opt.a:0 "Yes, and in the darkness bind them!"
  zz_valyria_magic_shadow_magic.007.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_07.toast.t:0  "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_07_name$"
  zz_valyria_magic_shadow_magic_07.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ weakening[target.GetFirstName] against all plots and schemes."
  zz_valyria_magic_shadow_magic_07.toast.tt:0 "$zz_valyria_magic_shadow_magic_07.toast.desc$"



  zz_valyria_magic_shadow_magic_08.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bcm$\n\nThe use of [shadow_magic|E] is capable of revealing the things that lurk in the dark. With this [zz_mystery|E] the target's shall be protected from plots and schemes."
  ##Spell Options
  ## event
  zz_valyria_magic_shadow_magic.008.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_08_name$"
  zz_valyria_magic_shadow_magic.008.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. It is possible to make the shadows flee from [recipient.GetName], to leave the plots and schemes of their enemies hindered. Shall we use the shadows themselves to protect from the knife hidden in the dusk?"
  zz_valyria_magic_shadow_magic.008.opt.a:0 "Yes, Keep them secure!"
  zz_valyria_magic_shadow_magic.008.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_08.toast.t:0  "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_08_name$"
  zz_valyria_magic_shadow_magic_08.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ weakening all plots and schemes targeting[target.GetFirstName]."
  zz_valyria_magic_shadow_magic_08.toast.tt:0 "$zz_valyria_magic_shadow_magic_08.toast.desc$"


  ## Interaction
  zz_valyria_magic_shadow_magic_09.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_cwok$\n\nThe use of the arcane forces of [shadow_magic|E] to strike out a chosen victim, using the shadows in an attempt hide your culpability in their death."
  ## event
  zz_valyria_magic_shadow_magic.009.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_09_name$"
  zz_valyria_magic_shadow_magic.009.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose. It is possible to conjure from the shadows a creature of the blade, one that will seek to end the life of [recipient.GetName]. Such an action carries risk, but is possible you might just be able to keep secret your act of murder."
  zz_valyria_magic_shadow_magic.009.opt.a:0 "Yes, Kill them!"
  zz_valyria_magic_shadow_magic.009.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_09.toast.t:0  "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_09_name$"
  zz_valyria_magic_shadow_magic_09.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ striking to kill from the shadows at[recipient.GetFirstName]."
  zz_valyria_magic_shadow_magic_09.toast.tt:0 "$zz_valyria_magic_shadow_magic_09.toast.desc$"

  ## Interaction
  zz_valyria_magic_shadow_magic_10.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_ta$\n$zz_da$\n$zz_ld$\n\nThe use of the arcane forces of [shadow_magic|E] to strike an army, seeking their utter ruin."
  ## event
  zz_valyria_magic_shadow_magic.010.t:0 "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_10_name$"
  zz_valyria_magic_shadow_magic.010.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nA dark and unsettling shadow has begun to seep into the room, swelling and gorging itself on the darkness cast by the light. Now is the moment to choose.\n With the shadows aligned you could draw forth an umbral blast, consuming the light and strike one of the armies of [recipient.GetName]."
  zz_valyria_magic_shadow_magic.010.opt.a:0 "Yes, Kill them!"
  zz_valyria_magic_shadow_magic.010.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_shadow_magic_10.toast.t:0  "[shadow_magic|E] - $zz_valyria_magic_shadow_magic_10_name$"
  zz_valyria_magic_shadow_magic_10.toast.desc:0 "$zz_toast_01$ [shadow_magic|E], $zz_toast_02$ calling forth a blast of hidden shadow to strike at [target.GetFirstName]."
  zz_valyria_magic_shadow_magic_10.toast.tt:0 "$zz_valyria_magic_shadow_magic_10.toast.desc$"


