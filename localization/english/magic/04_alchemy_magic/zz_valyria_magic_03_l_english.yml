  zz_valyria_magic_alchemy_magic.002.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of substances is an ancient and arcane art. Though the pyromancers and some wondering chemists are thought to be what remains of such practices, at your command true alchemy can be done. It would be possible through such transmutations to make more effortless the construction projects in [recipient.GetName]'s provinces. But is it wise to rely upon magic in this way?"
  zz_valyria_magic_alchemy_magic.002.opt.a:0 "Yes, Let the world be transmuted!"
  zz_valyria_magic_alchemy_magic.002.opt.z:0 "No, do not cast!"
  ## Spell Toast
