  zz_valyria_magic_alchemy_magic.016.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of substances is an ancient and arcane art. Though the pyromancers and some wondering chemists are thought to be what remains of such practices, at your command true alchemy can be done. It would be possible to transumute concepts, to make the forces of [recipient.GetName] more potent. This could give them more knights, or more professional troops, or indeed to increase the capabilities of what they already possess, but is it wise to rely upon magic in this way?"
  zz_valyria_magic_alchemy_magic.016.opt.a:0 "Yes, Make Men at Arms titular more Effective!"
  zz_valyria_magic_alchemy_magic.016.opt.z:0 "No, do not cast!"

  ## Spell Toast
  zz_valyria_magic_alchemy_magic_16.toast.t:0 "[alchemy_magic|E] - $zz_valyria_magic_alchemy_magic_16_name$"
  zz_valyria_magic_alchemy_magic_16.toast.desc:0 "$zz_toast_01$ [alchemy_magic|E], $zz_toast_02$ granting improved armaments to the forces of [recipient.GetFirstName]."
  zz_valyria_magic_alchemy_magic_16.toast.tt:0 "$zz_valyria_magic_alchemy_magic_16.toast.desc$"




  ## Interaction
  zz_valyria_magic_alchemy_magic_17.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_ta$\n$zz_da$\n$zz_md$\n\nThrough the secret arts of [alchemy_magic|E] it is possible to launch an assault of transmutative magic, mutating and harming your foe with uncontrolled transformative energies "

  ##event
  zz_valyria_magic_alchemy_magic.017.t:0 "[alchemy_magic|E] - $zz_valyria_magic_alchemy_magic_16_name$"
  zz_valyria_magic_alchemy_magic.017.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of substances is an ancient and arcane art. Though the pyromancers and some wondering chemists are thought to be what remains of such practices, at your command true alchemy can be done. It is possible to launch an assault upon [recipient.GetName] with the magics of pure transmutation. This assault would surely leave them mortally harmed, ruined or crippled, but is it wise to rely upon magic in this way?"
  zz_valyria_magic_alchemy_magic.017.opt.a:0 "Yes, have them broken!"
  zz_valyria_magic_alchemy_magic.017.opt.b:0 "Yes, Render them to nothing!"
  zz_valyria_magic_alchemy_magic.017.opt.z:0 "No, do not cast!"

  ## Spell Toast
  zz_valyria_magic_alchemy_magic_17.toast.t:0 "[alchemy_magic|E] - $zz_valyria_magic_alchemy_magic_17_name$"
