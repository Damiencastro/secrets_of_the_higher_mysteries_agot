  zz_valyria_magic_water_magic_spells.011.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe inhabitants of the Rhoyne were masters of binding the source of life to their purposes. They could remove rot, and strike dragons down from the air with spouts of furious water. It is possible to call forth the purifying properties of water, and to have all disease and infection purged from the body of [recipient.GetName]. Sucha  power will leave a lingering immunity to disease. "
  zz_valyria_magic_water_magic_spells.011.opt.a:0 "Yes, let them be purified!"
  zz_valyria_magic_water_magic_spells.011.opt.z:0 "No, do not cast!"
