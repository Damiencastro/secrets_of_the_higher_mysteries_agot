  ## Water Magic
  ## Interaction
  zz_valyria_magic_water_magic_01.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_cwok$\n\nThe arts of [water_magic|E] allows for a most terrifying of actions. To bring forth the might of water as a physical force, to strike at your foes and bring them physically to ruin."

  ##Spell Options
  ##event
  zz_valyria_magic_water_magic_spells.001.t:0 "[water_magic|E] - $zz_valyria_magic_water_magic_01_name$"
  zz_valyria_magic_water_magic_spells.001.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe inhabitants of the Rhoyne were masters of binding the source of life to their purposes. They could remove rot, and strike dragons down from the air with spouts of furious water. Indeed, even their final act, to unleash a plague unto the waking world was born from their powers over the waters. Water is a mighty force, capable of crushing anything under its weight. You can strike down [recipient.GetName] under an immense torrent, crushing their bones and rupturing their organs. Is this the weapon you want?"
  zz_valyria_magic_water_magic_spells.001.opt.a:0 "Yes, let my fury free!"
  zz_valyria_magic_water_magic_spells.001.opt.b:0 "Yes, strike them down with the waves!"

  zz_valyria_magic_water_magic_spells.001.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_water_magic_01.toast.t:0 "[water_magic|E] - $zz_valyria_magic_water_magic_01_name$"
  zz_valyria_magic_water_magic_01.toast.desc:0 "$zz_toast_01$ [water_magic|E], $zz_toast_02$ striking [recipient.GetFirstName] with a crushing blast of water"
  zz_valyria_magic_water_magic_01.toast.tt:0 "$zz_valyria_magic_water_magic_01.toast.desc$"
  zz_valyria_magic_water_magic_01.toast.tyranny:0 ""

  ## Interaction

  zz_valyria_magic_water_magic_02.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_ta$\n$zz_da$\n$zz_ld$\n\nThe arts of [water_magic|E] allows for a most terrifying of actions. To bring forth the might of water as a physical force, to strike at the armies of your foe, to bring them to utter ruin upon the battlefied"
  ##event
  zz_valyria_magic_water_magic_spells.002.t:0 "[water_magic|E] - $zz_valyria_magic_water_magic_02_name$"
  zz_valyria_magic_water_magic_spells.002.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe inhabitants of the Rhoyne were masters of binding the source of life to their purposes. They could remove rot, and strike dragons down from the air with spouts of furious water. Indeed, even their final act, to unleash a plague unto the waking world was born from their powers over the waters. It is within your options to unleash a flood of water, to strike and wash away one of the armies of [recipient.GetName]. Is this the weapon you want?"
  zz_valyria_magic_water_magic_spells.002.opt.a:0 "Yes, let my fury free!"
  zz_valyria_magic_water_magic_spells.002.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_water_magic_02.toast.t:0 "[water_magic|E] - $zz_valyria_magic_water_magic_02_name$"
  zz_valyria_magic_water_magic_02.toast.desc:0 "$zz_toast_01$ [water_magic|E], $zz_toast_02$ striking the forces of [recipient.GetFirstName] with a crushing torrent of water"
  zz_valyria_magic_water_magic_02.toast.tt:0 "$zz_valyria_magic_water_magic_02.toast.desc$"

  ## Interaction
  zz_valyria_magic_water_magic_03.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_ta$\n$zz_as$\n\nThe arts of [water_magic|E] allows for a most beneficial power, the rejuvenation of your forces. With this simple spell, you are able to restore your armies supplies to facilitate their march into battle."
  ##event
  zz_valyria_magic_water_magic_spells.003.t:0 "[water_magic|E] - $zz_valyria_magic_water_magic_03_name$"
  zz_valyria_magic_water_magic_spells.003.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe inhabitants of the Rhoyne were masters of binding the source of life to their purposes. They could remove rot, and strike dragons down from the air with spouts of furious water. Indeed, even their final act, to unleash a plague unto the waking world was born from their powers over the waters.You can with the powers availiable to you, purify the waters near one of [recipient.GetName] armies. This would refresh their supply and ability to wage war. Do you wish to?"
  zz_valyria_magic_water_magic_spells.003.opt.a:0 "Yes, logistics win wars!"
  zz_valyria_magic_water_magic_spells.003.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_water_magic_03.toast.t:0 "[water_magic|E] - $zz_valyria_magic_water_magic_03_name$"
  zz_valyria_magic_water_magic_03.toast.desc:0 "$zz_toast_01$ [water_magic|E], $zz_toast_02$ restoring the supplies of the army of [recipient.GetFirstName]"
  zz_valyria_magic_water_magic_03.toast.tt:0 "$zz_valyria_magic_water_magic_03.toast.desc$"

  ## Interaction
  zz_valyria_magic_water_magic_04.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tp$\n$zz_ve$\n$zz_se$\n\nThe arts of [water_magic|E] allows for a most terrifying power. Through the corruption of the humours, it is possible to turn health into sickness, to manifest forth a wave of unspeakable pestilence. Such a power does not distinguish friend from fore and strikes all down."
  ##event
  zz_valyria_magic_water_magic_spells.004.t:0 "[water_magic|E] - $zz_valyria_magic_water_magic_04_name$"
  zz_valyria_magic_water_magic_spells.004.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe inhabitants of the Rhoyne were masters of binding the source of life to their purposes. They could remove rot, and strike dragons down from the air with spouts of furious water. Indeed, even their final act, to unleash a plague unto the waking world was born from their powers over the waters.You could call upon one of the many plagues of the world, and unleash it upon a province of [recipient.GetName]. This would be indiscriminate and you cannot know whom it would strike down. Do you wish to risk such a weapon?"
  zz_valyria_magic_water_magic_spells.004.opt.e:0 "This plague shall ravage"
  zz_valyria_magic_water_magic_spells.004.opt.a:0 "Yes, let a small plague stalk the land!"
  zz_valyria_magic_water_magic_spells.004.opt.b:0 "Yes, let a major plague stalk the land!"
  zz_valyria_magic_water_magic_spells.004.opt.c:0 "Yes, let an apocalyptic plague stalk the land!"
  zz_valyria_magic_water_magic_spells.004.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_water_magic_04.toast.t:0 "[water_magic|E] - $zz_valyria_magic_water_magic_04_name$"
  zz_valyria_magic_water_magic_04.toast.desc:0 "$zz_toast_01$ [water_magic|E], $zz_toast_02$ unleashing a virtulent pestilence in the province of [recipient.GetFirstName], [target.GetName]."
  zz_valyria_magic_water_magic_04.toast.tt:0 "$zz_valyria_magic_water_magic_04.toast.desc$"


  ## Interaction
