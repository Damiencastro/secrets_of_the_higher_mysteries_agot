  ## Fire Magic
  ## Interaction
  zz_valyria_magic_fire_magic_01.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_cwok$\n\nThrough the arts of [fire_magic|E] it is possible to conjure a blast of concentrated flame. With this weapon you can strike down your enemies and inspire fear in those who watch this element bend to your will."
  ## Spell Options
  ##event
  zz_valyria_magic_fire_magic_spells.001.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_01_name$"
  zz_valyria_magic_fire_magic_spells.001.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. You could have [recipient.GetName] consumed by the fires, but such a means of death, is it truly fitting?"
  zz_valyria_magic_fire_magic_spells.001.opt.a:0 "Yes, let fire take them!"
  zz_valyria_magic_fire_magic_spells.001.opt.b:0 "Yes, let the full fury of the fire take them!"
  zz_valyria_magic_fire_magic_spells.001.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_fire_magic_01.toast.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_01_name$"
  zz_valyria_magic_fire_magic_01.toast.desc:0 "$zz_toast_01$ [fire_magic|E], $zz_toast_02$ lashing forth with burning tongues of fire at [recipient.GetFirstName]."
  zz_valyria_magic_fire_magic_01.toast.tt:0 "$zz_valyria_magic_fire_magic_01.toast.desc$"
  zz_valyria_magic_fire_magic_01.toast.tyranny:0 ""

  ## Interaction
  zz_valyria_magic_fire_magic_02.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_ta$\n$zz_da$\n$zz_md$\n\nThrough the arts of [fire_magic|E] it is possible to unleash a flaming deluge. Such a weapon shall bring low the armies of your enmies, as the grasping flames reduce to ash, man, beast, and stone."
  ##event
  zz_valyria_magic_fire_magic_spells.002.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_02_name$"
  zz_valyria_magic_fire_magic_spells.002.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. You could launch a blast of unremitting flame at an army of [recipient.GetName]. But surely such a monstrous act is beyond the limits of a just war?"
  zz_valyria_magic_fire_magic_spells.002.opt.a:0 "Yes, let fire take them!"
  zz_valyria_magic_fire_magic_spells.002.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_fire_magic_02.toast.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_02_name$"
  zz_valyria_magic_fire_magic_02.toast.desc:0 "$zz_toast_01$ [fire_magic|E], $zz_toast_02$ striking forth with a blast of flame, consuming troops of [recipient.GetFirstName]."
  zz_valyria_magic_fire_magic_02.toast.tt:0 "$zz_valyria_magic_fire_magic_02.toast.desc$"


  ## Interaction
  zz_valyria_magic_fire_magic_03.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_ta$\n$zz_da$\n$zz_sd$\n\nThrough the arts of [fire_magic|E] it is possible to conjure forth a veritable holocaust. To render an entire region under an unholy conflagration of flame. Such a a weapon of war rivals the might of the dragons."
  ##event
  zz_valyria_magic_fire_magic_spells.003.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_03_name$"
  zz_valyria_magic_fire_magic_spells.003.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. You could launch call forth a veritable storm of flame to consume an army of [recipient.GetName]. But such acts surely stain the soul in their total depravirty?"
  zz_valyria_magic_fire_magic_spells.003.opt.a:0 "Yes, BURN THEM ALL!"
  zz_valyria_magic_fire_magic_spells.003.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_fire_magic_03.toast.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_03_name$"
  zz_valyria_magic_fire_magic_03.toast.desc:0 "$zz_toast_01$ [fire_magic|E], $zz_toast_02$ striking forth with a veritable holocaust, consuming an entire region of [recipient.GetFirstName] in flame."
  zz_valyria_magic_fire_magic_03.toast.tt:0 "$zz_valyria_magic_fire_magic_03.toast.desc$"


  ## Interaction
  zz_valyria_magic_fire_magic_04.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_hc$\n$zz_ctb$\n\nThrough the arts of [fire_magic|E] it is possible to burn away the concepts of imperfection. With a risk of burning, a character can be restored to health."
  ##event
  zz_valyria_magic_fire_magic_spells.004.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_04_name$"
  zz_valyria_magic_fire_magic_spells.004.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. But you can wage a war upon the illnesses that ravage the mortal form. Perhaps you can set the flames upon [recipient.GetName] and try and burn away the things that bring their body to its limits. But are the benefits worth the risks?"
  zz_valyria_magic_fire_magic_spells.004.opt.a:0 "Yes, Let the fire purify them!"
  zz_valyria_magic_fire_magic_spells.004.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_fire_magic_04.toast.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_04_name$"
  zz_valyria_magic_fire_magic_04.toast.desc:0 "$zz_toast_01$ [fire_magic|E], $zz_toast_02$ purifying[recipient.GetFirstName] in flame."
  zz_valyria_magic_fire_magic_04.toast.tt:0 "$zz_valyria_magic_fire_magic_04.toast.desc$"


  ## Interaction
  zz_valyria_magic_fire_magic_05.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bca$\n\nThrough the arts of [fire_magic|E] it is possible to enchant blades with a temporary flame. An army led by a character empowered with this [zz_mystery|E] will do additional damage."
  ##event
  zz_valyria_magic_fire_magic_spells.005.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_05_name$"
  zz_valyria_magic_fire_magic_spells.005.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. You could call a flame to inhabit the blades of one of [recipient.GetName]'s armies. But surely such weapons would violate the laws of honourable war?"
  zz_valyria_magic_fire_magic_spells.005.opt.a:0 "Yes, BURN THEM ALL!"
  zz_valyria_magic_fire_magic_spells.005.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_fire_magic_05.toast.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_05_name$"
  zz_valyria_magic_fire_magic_05.toast.desc:0 "$zz_toast_01$ [fire_magic|E], $zz_toast_02$ empowering the forces of [recipient.GetFirstName] with blades empowered by flame."
  zz_valyria_magic_fire_magic_05.toast.tt:0 "$zz_valyria_magic_fire_magic_05.toast.desc$"

  ## Interaction
  zz_valyria_magic_fire_magic_06.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_rs$\n\nThrough the arts of [fire_magic|E] it is possible to seek out secrets in the light of the flames. By staring long into the fires the recipient of the fire's blessing can percieve secrets from those who may wish to hide them from them."

  ##event
  zz_valyria_magic_fire_magic_spells.006.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_06_name$"
  zz_valyria_magic_fire_magic_spells.006.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. You could call a flame to reveal the secrets of others to [recipient.GetName]. But surely is it wise to invade the secrets of others this way?"
  zz_valyria_magic_fire_magic_spells.006.opt.a:0 "Yes, reveal the secrets!"
  zz_valyria_magic_fire_magic_spells.006.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_fire_magic_06.toast.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_06_name$"
