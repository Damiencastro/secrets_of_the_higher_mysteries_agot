  zz_valyria_magic_fire_magic_08.toast.tt:0 "$zz_valyria_magic_fire_magic_08.toast.desc$"


  ## Interaction
  zz_valyria_magic_fire_magic_09.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tr$\n$zz_dr$\n$zz_sd$\n\nThrough the arts of [fire_magic|E] it is possible to unleash pure flame upon the elite soldiers of your enemy.."

  ##event
  zz_valyria_magic_fire_magic_spells.009.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_09_name$"
  zz_valyria_magic_fire_magic_spells.009.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. You order an assault with a ball of fire, that strikes at one of the regiments of [recipient.GetName], reducing men, supplies and hopes to a sludgy black ash."
  zz_valyria_magic_fire_magic_spells.009.opt.a:0 "Yes, reveal the secrets!"
