  zz_valyria_magic_fire_magic_09.toast.tt:0 "$zz_valyria_magic_fire_magic_09.toast.desc$"



  ## Interaction
  zz_valyria_magic_fire_magic_10.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bca$\n\nThrough the arts of [fire_magic|E] it is possible to empower the forces commanded by a character with the essence of dragon fire, granting them substantial advantage on the field of battle."

  ##event
  zz_valyria_magic_fire_magic_spells.010.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_10_name$"
  zz_valyria_magic_fire_magic_spells.010.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. You can infuse the army of [recipient.GetName] with the essence of a Dragon's Fire, empowering their capabilities to win decisive advantage over the forces of the enemy."
  zz_valyria_magic_fire_magic_spells.010.opt.a:0 "Yes, reveal the secrets!"
