  ## Interaction
  zz_valyria_magic_fire_magic_08.tooltip.desc:0 "Effects:\n$zz_dop$\n$zz_tc$\n$zz_bca$\n\nThrough the arts of [fire_magic|E] it is possible to empower the weapons of an army to do more damage when taking part in sieges."

  ##event
  zz_valyria_magic_fire_magic_spells.008.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_08_name$"
  zz_valyria_magic_fire_magic_spells.008.desc:0 "[secondary_recipient.GetName] stands ready to enact a mystery. \nThe manipulation of flame is an art as old as ancient Valyria. The dragon lords would command the flame in conjunction with their dragons, and it was always a potent weapon of war. You can infuse the weapons of the soldiers of [recipient.GetName] with a roaring flame, letting them blast down the walls that stop them from completing their bloody business."
  zz_valyria_magic_fire_magic_spells.008.opt.a:0 "Yes, reveal the secrets!"
  zz_valyria_magic_fire_magic_spells.008.opt.z:0 "No, do not cast!"
  ## Spell Toast
  zz_valyria_magic_fire_magic_08.toast.t:0 "[fire_magic|E] - $zz_valyria_magic_fire_magic_08_name$"
